---
Name: 'asset-icons'
---
SilverStripe\Admin\LeftAndMain:
  extra_requirements_javascript:
    - restruct/silverstripe-asset_icons:client/dist/js/asset-icons.js
  extra_requirements_css:
    - restruct/silverstripe-asset_icons:client/dist/styles/asset-icons.css

# Renderable preview: generates PNG thumbnails for non-image files (PDF, SVG, etc.)
# using external CLI tools (Ghostscript, rsvg-convert).
# Disabled by default — opt in per project.
SilverStripe\Assets\File:
  extensions:
    - Restruct\SilverStripe\AssetIcons\Renderable\RenderablePreviewExtension
